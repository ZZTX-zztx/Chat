name = "chat"
main = "src/worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "CHAT_KV", id = "3f48e77d245f41bfa2fbc1852bf7c98b" }
]

[vars]
ROOM_ID = "default-room"
MAX_MESSAGES = "500"
API_KEY = ""
APP_VERSION_CODE = "6"
APP_VERSION_NAME = "1.2.4"
APP_DOWNLOAD_URL = "https://chat-apk.zztxer.dpdns.org/1.2.4-app-debug.apk"
APP_CHANGELOG = "1. 【新增】启动自动检测 Download/chat_account.usc 并导入：触发条件由「nickname 和 baseUrl 同时为空」改为「只要任一关键字段缺失」即尝试从 USC 恢复配置\n2. 【修复】Android 10+ 上 MediaStore 查询 usc 文件的 RELATIVE_PATH 精确匹配在部分机型上查不到文件；改为多前缀宽松匹配 + 有权限时回退到传统直接读 File 路径\n3. 【优化】API Key 动态生效：设置里填写的或从 USC 导入的 apiKey 会真正应用到所有请求（之前只使用了编译时 BuildConfig.API_KEY）；空值不发送 x-api-key Header\n4. 【修复】startChat、健康检查、版本检查三处网络入口统一先调用 RetrofitClient.setApiKey()，确保所有接口使用同一套身份凭据"
APP_FORCE_UPDATE = "false"
APP_MIN_SDK = "24"
WIN_VERSION_CODE = "6"
WIN_VERSION_NAME = "1.0.5"
WIN_DOWNLOAD_URL = "https://chat-windows.zztxer.dpdns.org/1.0.5_Chat_Setup_x64.exe"
WIN_CHANGELOG = "1. 【修复】修复 Cloudflare KV list() 每日请求限制超出问题，引入消息索引机制"
WIN_FORCE_UPDATE = "false"
name = "chat"
main = "src/worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "CHAT_KV", id = "3f48e77d245f41bfa2fbc1852bf7c98b" }
]

[vars]
ROOM_ID = "default-room"
MAX_MESSAGES = "500"
API_KEY = ""
APP_VERSION_CODE = "5"
APP_VERSION_NAME = "1.2.3"
APP_DOWNLOAD_URL = "https://chat-apk.zztxer.dpdns.org/1.2.3-apk-debug.apk"
APP_CHANGELOG = "1. 【优化】文件消息点击改为预览弹窗：顶部显示文件类型大图标（PDF/文档/压缩包/视频/音频/图片/通用 共7种），下方显示文件名、大小、扩展名、MIME 类型；右下角提供「保存到 Download」「打开文件」两个独立按钮\n2. 【优化】定位消息点击改为预览弹窗：显示 6 位精度坐标、精度 ±xx 米；右下角提供「复制坐标到剪贴板」「打开地图」两个独立按钮\n3. 【修复】消息气泡定位图标从 📍（UTF-16 代理对）改为 Roboto 自带的 ⊙（BMP 平面），避免部分机型显示空白豆腐块\n4. 【清理】移除 MessageAdapter 中冗余的内联文件保存/打开、地图跳转代码，统一由 MainActivity 管理，减少约 80 行重复逻辑"
APP_FORCE_UPDATE = "false"
APP_MIN_SDK = "24"
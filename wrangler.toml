name = "chat"
main = "src/worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "CHAT_KV", id = "3f48e77d245f41bfa2fbc1852bf7c98b" }
]

[vars]
ROOM_ID = "default-room"
MAX_MESSAGES = "500"
API_KEY = ""
APP_VERSION_CODE = "3"
APP_VERSION_NAME = "1.2.1"
APP_DOWNLOAD_URL = "https://chat-apk.zztxer.dpdns.org/app-debug.apk"
APP_CHANGELOG = "1. 【新增】支持发送 10MB 以内任意文件（PDF/Word/ZIP/短视频 MP4/MOV 等），点击消息气泡自动保存到 Download 并调起系统打开器\n2. 【优化】底部图片/定位/文件 三个按钮合并为微信风格的「圆圈+加号」单入口，点击弹出带自绘图标的菜单\n3. 【修复】文件消息通知不再显示长 Base64 串，统一替换为「[文件]」占位；后端 Worker 新增 18MB 请求体上限保护 KV 存储\n4. 【修复】自动更新 DownloadManager 下载失败问题：放宽充电/空闲/网络限制、模拟 Chrome UA、下载失败时自动翻译中文错误原因并跳浏览器兜底，保证 APK 总能拿到"
APP_FORCE_UPDATE = "false"
APP_MIN_SDK = "24"
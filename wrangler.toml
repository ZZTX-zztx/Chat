name = "chat"
main = "src/worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "CHAT_KV", id = "3f48e77d245f41bfa2fbc1852bf7c98b" }
]

[vars]
ROOM_ID = "default-room"
MAX_MESSAGES = "500"
API_KEY = ""
APP_VERSION_CODE = "7"
APP_VERSION_NAME = "1.2.5"
APP_DOWNLOAD_URL = "https://chat-apk.zztxer.dpdns.org/1.2.5-app-debug.apk"
APP_CHANGELOG = "1. 【新增】添加密码登录功能，支持用户名密码注册和登录\n2. 【新增】登录成功后获取 token，后续请求自动携带身份认证\n3. 【新增】token 有效期为 24 小时，过期后需重新登录\n4. 【新增】启动时显示登录对话框，支持跳过登录使用原有设置"
APP_FORCE_UPDATE = "false"
APP_MIN_SDK = "24"
WIN_VERSION_CODE = "13"
WIN_VERSION_NAME = "1.1.2"
WIN_DOWNLOAD_URL = "https://chat-windows.zztxer.dpdns.org/1.1.2_Chat_Setup_x64.exe"
WIN_CHANGELOG = "1. 【新增】单实例检测，重复打开自动激活已有窗口\n2. 【修复】重写更新流程：隐藏窗口→下载→关闭旧进程→静默安装→启动新版本\n3. 【新增】收到新消息时系统托盘弹出通知气泡\n4. 【新增】添加系统托盘图标，关闭窗口后程序仍在后台运行\n5. 【安全】强制账号密码登录防止身份冒用"
WIN_FORCE_UPDATE = "false"